<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> HTML Input Types</h1>
    <form>

        <!-- example of labels -->
        <label><b>Enter your Name :</b> </label>
        <input type="text" placeholder="Enter Your Name"/> <br> <br>
        <label><b>Enter your Email :</b> </label>
        <input type="email" placeholder="Enter Your Email"/> <br> <br>
        <label><b>Enter Password :</b> </label>
        <input type="password" placeholder="Enter Your password"/> <br> <br>
        <label><b>Enter Your Contact no. :</b> </label>
        <input type="number" placeholder="Enter Your contact no."/> <br> <br>
        <label><b>Enter Your Age : </b></label>
        <input type="number" placeholder="Enter Your Age"/> <br> <br>
        <label><b>Enter DOB:</b> </label>
        <input type="date"/> <br><br>
        <label><b>Enter Month:</b></label>
        <input type="month"/> <br><br>
        <label><b>Enter Week:</b></label>
        <input type="week"/> <br><br>
        <label><b>Enter Time:</b></label>
        <input type="time"/> <br><br>

            <!-- Example of Checkbox -->
             <label><b>Choose Cities :</b></label> <br><br>
             <input type="checkbox" checked>Mumbai <br>
             <input type="checkbox" checked>Pune <br>
             <input type="checkbox" checked>Sangli <br>
             <input type="checkbox" checked>Ahilyanagar <br>
             <input type="checkbox" checked>Jalgaon <br><br><br>

             <!-- Example of RadioButton -->

             <label><b>Select Gender:</b></label><br>
             <input type="radio" name="gender">Male
             <input type="radio" name="gender">Female
             <input type="radio" name="gender">others <br> <br>

             <label><b>Select Color:</b></label> <br> <br>
             <input type="color" >
             <label><b>Select Range</b></label> <br> <br>
             <input type="range"> <br> <br>
             <label><b>Upload Your photo:</b></label>
             <input type="file" multiple> <br> <br>

             <!-- Example of dropdown -->

              <label><b>Select Fav Dish :</b></label>
              <select>
                <option>Choose...</option>
                <option>Burger</option>
                <option>Pizza</option>
                <option>Momos</option>
                <option>Sandwich</option>
                <option>Fries</option> <br><br>
              </select> <br> <br>

              <!-- Example of TextArea -->
              <label><b>Enter Address:</b></label>
              <textarea rows="5" cols="40"></textarea><br><br><br>

              <!-- Example of Button -->

              <input type="submit" value="submit">
              <input type="button" value="submit">
              <input type="reset" value="reset">

              
             <br><br><br><br>

    </form>
</body>
</html>
